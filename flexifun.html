<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexiFun | Matilde Ricardo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@3.0.2/tsparticles.bundle.min.js"></script>
</head>
<body>
    <div id="tsparticles"></div>
    <nav>
        <div class="logo">MR</div>
        <a href="index.html" class="back-link">← Back to Portfolio</a>
    </nav>

    <section style="padding-top: 150px; text-align: center;">
        <span class="tag">Unity • PHP • Hardware</span>
        <h1 id="typing-title"></h1>
    </section>

    <main class="project-content">
        <section>
            <h2>Project Motivation</h2>
            <p>Gamifying rehabilitation to increase patient engagement.</p>
            <div class="carousel-container">
                <div class="carousel-track">
                    <div class="carousel-item active"><img src="jogo1.png" alt="Game"></div>
                    <div class="carousel-item"><img src="jogo2.png" alt="Game"></div>
                    <div class="carousel-item"><img src="jogo3.png" alt="Game"></div>
                </div>
                <button class="carousel-prev" style="position:absolute; left:10px; top:50%;">←</button>
                <button class="carousel-next" style="position:absolute; right:10px; top:50%;">→</button>
            </div>
        </section>

        <div class="info-grid">
            <div><h3>The Solution</h3><p>Sensorized glove interface.</p></div>
            <div><h3>Monitoring</h3><p>Real-time clinical dashboard.</p></div>
        </div>

        <div style="text-align: center; padding: 40px;">
            <a href="#" class="btn-github">View Source Code</a>
        </div>
    </main>

    <script>
        tsParticles.load("tsparticles", { /* mesma config do index */ particles: { number: { value: 60 }, color: { value: "#73b16d" }, move: { enable: true, speed: 0.6 } } });

        document.addEventListener("DOMContentLoaded", () => {
            // Typing Effect
            const text = "FlexiFun: Sensorized Glove for Rehabilitation";
            let i = 0;
            const type = () => { if(i < text.length) { document.getElementById('typing-title').innerHTML += text.charAt(i); i++; setTimeout(type, 70); } };
            type();

            // Carousel Logic
            const track = document.querySelector('.carousel-track');
            const items = document.querySelectorAll('.carousel-item');
            let curr = 0;
            const update = () => {
                items.forEach((item, idx) => item.classList.toggle('active', idx === curr));
                track.style.transform = `translateX(-${curr * 320}px)`; // Ajuste conforme largura
            };
            document.querySelector('.carousel-next').onclick = () => { curr = (curr + 1) % items.length; update(); };
            document.querySelector('.carousel-prev').onclick = () => { curr = (curr - 1 + items.length) % items.length; update(); };

            // Reveal Logic
            const reveals = ['.tag', 'section h2', 'section p', '.info-grid > div', '.btn-github'];
            reveals.forEach(s => document.querySelectorAll(s).forEach(el => el.classList.add('reveal')));
            const check = () => {
                document.querySelectorAll('.reveal').forEach(el => { if(el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add('active'); });
            };
            window.onscroll = check; check();
        });
    </script>
</body>
</html>
